<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Service</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">🎬 StreamFlix</h1>
                <div class="search-container">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Search shows, movies..."
                    >
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Trending Section -->
            <section class="content-section">
                <h2 class="section-title">🔥 Trending Now</h2>
                <div class="shows-grid" id="trendingGrid"></div>
            </section>

            <!-- Popular Section -->
            <section class="content-section">
                <h2 class="section-title">⭐ Most Popular</h2>
                <div class="shows-grid" id="popularGrid"></div>
            </section>

            <!-- New Releases Section -->
            <section class="content-section">
                <h2 class="section-title">✨ New Releases</h2>
                <div class="shows-grid" id="newGrid"></div>
            </section>
        </main>
    </div>

    <!-- Episodes Modal -->
    <div class="modal" id="episodesModal">
        <div class="modal-content episodes-modal">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            
            <div class="episodes-modal-body">
                <div class="modal-show-image">
                    <img id="modalShowImage" src="" alt="Show">
                </div>
                
                <div class="modal-show-info">
                    <h2 id="modalShowTitle" class="modal-title"></h2>
                    <div class="modal-meta">
                        <span id="modalShowYear"></span>
                        <span id="modalShowRating"></span>
                    </div>
                    <p id="modalShowDescription" class="modal-description"></p>
                    
                    <div class="episodes-list" id="episodesList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div class="modal" id="playerModal">
        <div class="modal-content player-modal">
            <button class="modal-close" id="closePlayerBtn">&times;</button>
            
            <div class="player-container">
                <video id="videoPlayer" class="video-player" controls>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div class="player-info">
                <h3 id="playerEpisodeTitle" class="player-title"></h3>
                <p id="playerEpisodeDesc" class="player-description"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
